<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Karen</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
    }

    body {
        font-family: Georgia, 'Times New Roman', Times, serif;
        background-color: #faf7f2;
        background-image: 
            radial-gradient(circle at 1px 1px, rgba(0,0,0,0.02) 1px, transparent 0);
        background-size: 20px 20px;
        color: #333333;
        font-family: Georgia, 'Times New Roman', Times, serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .card {
        background: #ffffff;
        width: 100%;
        max-width: 500px;
        padding: 48px 48px 52px;
        border-radius: 24px;
        box-shadow: 
            0 20px 40px -12px rgba(139, 115, 85, 0.15),
            0 8px 16px -8px rgba(139, 115, 85, 0.1),
            0 0 0 1px rgba(139, 115, 85, 0.05);
        text-align: center;
        position: relative;
        animation: cardEnter 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        transform: translateY(8px);
        opacity: 0;
    }

    .card::before {
        content: '';
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(212, 200, 184, 0.3);
        border-radius: 18px;
        pointer-events: none;
    }

    @keyframes cardEnter {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .photo {
        margin: -18px -18px 28px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(212,200,184,0.4);
        opacity: 0;
        animation: fadeIn 0.8s ease 0.15s forwards;
    }

    .photo img {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 4/3;
        object-fit: cover;
    }

    .to {
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9c8f7f;
        margin-bottom: 32px;
        font-weight: 400;
        opacity: 0;
        animation: fadeIn 0.8s ease 0.3s forwards;
    }

    .message {
        font-size: 24px;
        line-height: 1.95;
        color: #333333;
        font-weight: 400;
        margin-bottom: 36px;
        letter-spacing: -0.01em;
    }

    .message p {
        margin: 0;
        opacity: 0;
        transform: translateY(6px);
        animation: lineRise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .message p:nth-child(1) { animation-delay: 0.5s; }
    .message p:nth-child(2) { animation-delay: 0.65s; }
    .message p:nth-child(3) { animation-delay: 0.8s; }
    .message p:nth-child(4) { animation-delay: 0.95s; }
    .message p:nth-child(5) { animation-delay: 1.1s; }

    @keyframes lineRise {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .divider {
        margin: 36px auto 28px;
        width: 140px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: fadeIn 0.8s ease 1.3s forwards;
    }

    .divider svg {
        width: 100%;
        height: auto;
        overflow: visible;
    }

    .divider-line {
        stroke: #d4c8b8;
        stroke-width: 1;
        stroke-linecap: round;
        opacity: 0.7;
    }

    .divider-flower {
        fill: #d4c8b8;
        opacity: 0.6;
    }

    .from {
        font-style: italic;
        font-size: 16px;
        line-height: 1.6;
        color: #666666;
        letter-spacing: 0.01em;
        opacity: 0;
        animation: fadeIn 0.8s ease 1.45s forwards;
    }

    @media (hover: hover) and (pointer: fine) {
        .card {
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 28px 50px -14px rgba(139, 115, 85, 0.18),
                0 12px 20px -8px rgba(139, 115, 85, 0.12),
                0 0 0 1px rgba(139, 115, 85, 0.05);
        }
    }

    @media (max-width: 560px) {
        body {
            padding: 16px;
            background-size: 16px 16px;
        }
        .card {
            padding: 40px 28px 44px;
            border-radius: 20px;
        }
        .card::before {
            inset: 8px;
            border-radius: 14px;
        }
        .photo {
            margin: -12px -12px 24px;
            border-radius: 12px;
        }
        .to {
            font-size: 12px;
            margin-bottom: 24px;
        }
        .message {
            font-size: 20px;
            line-height: 1.85;
            margin-bottom: 28px;
        }
        .divider {
            margin: 28px auto 22px;
            width: 120px;
        }
        .from {
            font-size: 15px;
        }
    }

    @media print {
        body {
            background: white !important;
            background-image: none !important;
            padding: 0;
            min-height: auto;
        }
        .card {
            box-shadow: none !important;
            border: 1px solid #e5e0d7;
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
            max-width: 420px;
            margin: 40px auto;
            page-break-inside: avoid;
        }
        .card::before {
            border-color: #e5e0d7;
        }
        .to, .message p, .divider, .from, .photo {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
        }
        @page {
            margin: 1in;
            size: letter;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .card, .to, .message p, .divider, .from, .photo {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
        }
    }

    #title{
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #9c8f7f;
    }
</style>
</head>
<body>
    <main class="card" role="article" aria-label="Dedication card for Karen Kozdra">
        <div class="photo">
            <img src="cat.jpg" alt="Black and white cat curled in pink stroller">
        </div>
        
        <p class="to">To Karen Kozdra,</p>
        
        <div class="message">
            <section id="title">
            <p>Thank you for being so strong</p>
        </section>
        


            <div>
                <p>    <p>everyone my whole life has</p>
            <p>reminded me how much you try</p>
            <p>in this struggle of life</p>
            <p>God bless.</p>
        </p>
            </div>
        </div>

        <div class="divider" aria-hidden="true">
            <svg width="140" height="28" viewBox="0 0 140 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="divider-line" d="M2 14 H54 M86 14 H138" />
                <g transform="translate(70 14)">
                    <circle class="divider-flower" cx="0" cy="0" r="2.5"/>
                    <circle class="divider-flower" cx="-6.5" cy="0" r="1.8" opacity="0.7"/>
                    <circle class="divider-flower" cx="6.5" cy="0" r="1.8" opacity="0.7"/>
                    <circle class="divider-flower" cx="0" cy="-6" r="1.6" opacity="0.55"/>
                    <circle class="divider-flower" cx="0" cy="6" r="1.6" opacity="0.55"/>
                    <circle class="divider-flower" cx="-4.5" cy="-4.5" r="1.2" opacity="0.4"/>
                    <circle class="divider-flower" cx="4.5" cy="-4.5" r="1.2" opacity="0.4"/>
                    <circle class="divider-flower" cx="-4.5" cy="4.5" r="1.2" opacity="0.4"/>
                    <circle class="divider-flower" cx="4.5" cy="4.5" r="1.2" opacity="0.4"/>
                </g>
            </svg>
        </div>

        <p class="from">From David Kozdra, your son</p>
    </main>
</body>
</html>
