<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Karen</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23fff6f7'/%3E%3Cg fill='%23d86a8a'%3E%3Ccircle cx='32' cy='16' r='9'/%3E%3Ccircle cx='48' cy='32' r='9'/%3E%3Ccircle cx='32' cy='48' r='9'/%3E%3Ccircle cx='16' cy='32' r='9'/%3E%3C/g%3E%3Ccircle cx='32' cy='32' r='8' fill='%23ffd166'/%3E%3C/svg%3E">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
    }

    body {
        font-family: 'Courier New', Courier, monospace;
        background-color: #faf7f2;
        background-image: 
            radial-gradient(circle at 1px 1px, rgba(0,0,0,0.02) 1px, transparent 0);
        background-size: 20px 20px;
        color: #333333;
        font-family: Georgia, 'Times New Roman', Times, serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        overflow-y: auto;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .page-greeting {
        position: fixed;
        top: clamp(12px, 3vw, 28px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        font-size: clamp(20px, 4.2vw, 34px);
        line-height: 1.1;
        letter-spacing: 0.04em;
        color: #b15d70;
        text-shadow: 0 8px 16px rgba(177, 93, 112, 0.16);
        text-align: center;
        pointer-events: none;
        padding: 8px 12px;
    }

    .flower-rain {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
    }

    .sparkle-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
    }

    .flower {
        position: absolute;
        top: -14vh;
        left: 0;
        width: var(--size, 20px);
        height: var(--size, 20px);
        opacity: var(--opacity, 0.6);
        transform: translate3d(0, -14vh, 0) rotate(0deg);
        animation: flowerFall var(--duration, 12s) linear infinite;
        animation-delay: var(--delay, 0s);
        will-change: transform;
    }

    .flower::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 50% 20%, rgba(235, 150, 177, 0.9) 0 25%, transparent 26%),
            radial-gradient(circle at 80% 50%, rgba(235, 150, 177, 0.9) 0 25%, transparent 26%),
            radial-gradient(circle at 50% 80%, rgba(235, 150, 177, 0.9) 0 25%, transparent 26%),
            radial-gradient(circle at 20% 50%, rgba(235, 150, 177, 0.9) 0 25%, transparent 26%),
            radial-gradient(circle at 50% 50%, rgba(255, 209, 102, 0.95) 0 19%, transparent 20%);
        filter: drop-shadow(0 3px 5px rgba(117, 88, 56, 0.15));
    }

    @keyframes flowerFall {
        0% {
            transform: translate3d(0, -14vh, 0) rotate(0deg);
        }
        100% {
            transform: translate3d(var(--drift, 30px), 114vh, 0) rotate(360deg);
        }
    }

    .card {
        width: 100%;
        max-width: 500px;
        text-align: center;
        position: relative;
        z-index: 2;
        animation: cardEnter 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        transform: translateY(8px);
        opacity: 0;
        cursor: pointer;
        perspective: 1600px;
    }

    .card.fresh-open .card-face {
        animation: openBloom 680ms ease;
    }

    @keyframes openBloom {
        0% {
            box-shadow:
                0 8px 16px -10px rgba(139, 115, 85, 0.12),
                0 0 0 1px rgba(139, 115, 85, 0.05);
        }
        55% {
            box-shadow:
                0 34px 58px -12px rgba(212, 122, 152, 0.26),
                0 14px 24px -10px rgba(139, 115, 85, 0.2),
                0 0 0 1px rgba(139, 115, 85, 0.05);
        }
        100% {
            box-shadow:
                0 20px 40px -12px rgba(139, 115, 85, 0.15),
                0 8px 16px -8px rgba(139, 115, 85, 0.1),
                0 0 0 1px rgba(139, 115, 85, 0.05);
        }
    }

    .card-flip {
        position: relative;
        display: grid;
        transform-style: preserve-3d;
        transition: transform 920ms cubic-bezier(0.22, 0.78, 0.18, 1);
    }

    .card-face {
        grid-area: 1 / 1;
        background: #ffffff;
        padding: 48px 48px 52px;
        border-radius: 24px;
        box-shadow:
            0 20px 40px -12px rgba(139, 115, 85, 0.15),
            0 8px 16px -8px rgba(139, 115, 85, 0.1),
            0 0 0 1px rgba(139, 115, 85, 0.05);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        position: relative;
        min-height: 640px;
    }

    .card-face::before {
        content: '';
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(212, 200, 184, 0.3);
        border-radius: 18px;
        pointer-events: none;
    }

    .card-front {
        z-index: 2;
    }

    .card-back {
        transform: rotateY(180deg);
        z-index: 1;
    }

    .card.open .card-flip {
        transform: rotateY(180deg);
    }

    @keyframes cardEnter {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .photo {
        margin: 0 0 28px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(212,200,184,0.4);
        opacity: 0;
        animation: fadeIn 0.8s ease 0.15s forwards;
    }

    .hint {
        font-size: clamp(14px, 2.8vw, 17px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #a89c8d;
        font-weight: 600;
        margin: -6px 0 18px;
        opacity: 0;
        transition: opacity 220ms ease;
        animation: hintPulse 1.25s ease-in-out infinite;
    }

    .card:not(.open) .hint {
        opacity: 1;
    }

    .card.open .hint {
        display: none;
    }

    @keyframes hintPulse {
        0%, 100% {
            transform: translateY(0);
            opacity: 0.72;
        }
        50% {
            transform: translateY(-2px);
            opacity: 1;
        }
    }

    .card:not(.open) .card-flip {
        animation: teaseFlip 3.2s ease-in-out 1.1s infinite;
    }

    .card.open .card-flip,
    .card:focus-visible .card-flip,
    .card:hover .card-flip {
        animation: none;
    }

    @keyframes teaseFlip {
        0%, 100% {
            transform: rotateY(0deg);
        }
        38% {
            transform: rotateY(-12deg);
        }
        58% {
            transform: rotateY(0deg);
        }
    }

    .photo img {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 4/3;
        object-fit: cover;
    }

    .to {
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9c8f7f;
        margin-bottom: 32px;
        font-weight: 400;
        opacity: 0;
        animation: fadeIn 0.8s ease 0.3s forwards;
    }

    .message {
        font-size: 24px;
        line-height: 1.95;
        color: #333333;
        font-weight: 400;
        margin-bottom: 36px;
        letter-spacing: -0.01em;
    }

    .message p {
        margin: 0;
        min-height: 1.2em;
    }

    .message p.is-typing::after {
        content: '|';
        color: #9c8f7f;
        margin-left: 2px;
        animation: caretBlink 0.85s step-end infinite;
    }

    @keyframes caretBlink {
        0%, 49% {
            opacity: 1;
        }
        50%, 100% {
            opacity: 0;
        }
    }

    .message p:nth-child(1) { animation-delay: 0.5s; }
    .message p:nth-child(2) { animation-delay: 0.65s; }
    .message p:nth-child(3) { animation-delay: 0.8s; }
    .message p:nth-child(4) { animation-delay: 0.95s; }
    .message p:nth-child(5) { animation-delay: 1.1s; }
    .message p:nth-child(6) { animation-delay: 1.25s; }

    @keyframes lineRise {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .sparkle {
        position: absolute;
        width: var(--s, 10px);
        height: var(--s, 10px);
        border-radius: 50%;
        left: var(--x, 50vw);
        top: var(--y, 50vh);
        background:
            radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95) 0 28%, transparent 30%),
            radial-gradient(circle at 50% 50%, rgba(234, 134, 166, 0.85) 0 64%, transparent 66%);
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
        animation: sparklePop 900ms cubic-bezier(0.12, 0.62, 0.26, 1) forwards;
    }

    @keyframes sparklePop {
        0% {
            transform: translate(-50%, -50%) scale(0.2);
            opacity: 0;
        }
        20% {
            opacity: 1;
        }
        100% {
            transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px))) scale(1.15);
            opacity: 0;
        }
    }

    .divider {
        margin: 36px auto 28px;
        width: 140px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: fadeIn 0.8s ease 1.3s forwards;
    }

    .divider svg {
        width: 100%;
        height: auto;
        overflow: visible;
    }

    .divider-line {
        stroke: #d4c8b8;
        stroke-width: 1;
        stroke-linecap: round;
        opacity: 0.7;
    }

    .divider-flower {
        fill: #d4c8b8;
        opacity: 0.6;
    }

    .from {
        font-style: italic;
        font-size: 16px;
        line-height: 1.6;
        color: #666666;
        letter-spacing: 0.01em;
        opacity: 0;
        animation: fadeIn 0.8s ease 1.45s forwards;
    }

    .card:focus-visible {
        outline: 3px solid rgba(156, 143, 127, 0.35);
        outline-offset: 4px;
    }

    @media (hover: hover) and (pointer: fine) {
        .card:hover .card-face {
            box-shadow:
                0 28px 50px -14px rgba(139, 115, 85, 0.18),
                0 12px 20px -8px rgba(139, 115, 85, 0.12),
                0 0 0 1px rgba(139, 115, 85, 0.05);
        }
    }

    @media (max-width: 560px) {
        body {
            padding: 16px;
            background-size: 16px 16px;
        }
        .page-greeting {
            top: 10px;
            font-size: clamp(18px, 7vw, 26px);
            padding: 6px 10px;
        }
        .card-face {
            padding: 40px 28px 44px;
            border-radius: 20px;
            min-height: 560px;
        }
        .card-face::before {
            inset: 8px;
            border-radius: 14px;
        }
        .photo {
            margin: 0 0 24px;
            border-radius: 12px;
        }
        .hint {
            font-size: 15px;
            letter-spacing: 0.05em;
            margin: -4px 0 16px;
        }
        .to {
            font-size: 12px;
            margin-bottom: 24px;
        }
        .message {
            font-size: 20px;
            line-height: 1.85;
            margin-bottom: 28px;
        }
        .divider {
            margin: 28px auto 22px;
            width: 120px;
        }
        .from {
            font-size: 15px;
        }
    }

    @media print {
        body {
            background: white !important;
            background-image: none !important;
            padding: 0;
            min-height: auto;
        }
        .card-face {
            box-shadow: none !important;
            border: 1px solid #e5e0d7;
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
            max-width: 420px;
            margin: 40px auto;
            page-break-inside: avoid;
        }
        .card-face::before {
            border-color: #e5e0d7;
        }
        .card-flip {
            transform: none !important;
            animation: none !important;
        }
        .card-back {
            display: none;
        }
        .to, .message p, .divider, .from, .photo {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
        }
        @page {
            margin: 1in;
            size: letter;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .card, .card-flip, .to, .message p, .divider, .from, .photo, .hint, .flower, .sparkle {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
        }
        .card-flip {
            transition: none !important;
        }
        .flower-rain,
        .sparkle-layer {
            display: none;
        }
    }

    #title {
        font-size: clamp(20px, 5vw, 28px);
        font-weight: 600;
        margin-bottom: 16px;
        color: #9c8f7f;
    }
</style>
</head>
<body>
    <div class="flower-rain" aria-hidden="true"></div>
    <div class="sparkle-layer" aria-hidden="true"></div>
    <p class="page-greeting" aria-hidden="true">Happy Mother's Day</p>

    <main class="card" role="button" tabindex="0" aria-expanded="false" aria-label="Dedication card for Karen Kozdra. Click to open or close.">
        <div class="card-flip">
            <section class="card-face card-front" aria-label="Front of card">
                <div class="photo">
                    <img src="cat.jpg" alt="Black and white cat curled in pink stroller">
                </div>

                <p class="hint">Tap card to open</p>

                <p class="to">To Karen, my mom,</p>
            </section>

            <section class="card-face card-back" aria-label="Inside message">
                <p class="to">To Karen, my mom,</p>

                <div class="message">
                    <p id="title">Thank you for being so strong</p>
                    <p>Everyone in my whole life has</p>
                    <p>reminded me how much you try</p>
                    <p>in the struggle of life</p>
                    <p>God bless.</p>
                </div>

                <div class="divider" aria-hidden="true">
                    <svg width="140" height="28" viewBox="0 0 140 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="divider-line" d="M2 14 H54 M86 14 H138" />
                        <g transform="translate(70 14)">
                            <circle class="divider-flower" cx="0" cy="0" r="2.5"/>
                            <circle class="divider-flower" cx="-6.5" cy="0" r="1.8" opacity="0.7"/>
                            <circle class="divider-flower" cx="6.5" cy="0" r="1.8" opacity="0.7"/>
                            <circle class="divider-flower" cx="0" cy="-6" r="1.6" opacity="0.55"/>
                            <circle class="divider-flower" cx="0" cy="6" r="1.6" opacity="0.55"/>
                            <circle class="divider-flower" cx="-4.5" cy="-4.5" r="1.2" opacity="0.4"/>
                            <circle class="divider-flower" cx="4.5" cy="-4.5" r="1.2" opacity="0.4"/>
                            <circle class="divider-flower" cx="-4.5" cy="4.5" r="1.2" opacity="0.4"/>
                            <circle class="divider-flower" cx="4.5" cy="4.5" r="1.2" opacity="0.4"/>
                        </g>
                    </svg>
                </div>

                <p class="from">From David Kozdra, your son</p>
            </section>
        </div>
    </main>

<script>
    const card = document.querySelector('.card');
    const flowerRain = document.querySelector('.flower-rain');
    const sparkleLayer = document.querySelector('.sparkle-layer');
    const messageLines = [...document.querySelectorAll('.card-back .message p')];
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let typingRunId = 0;
    let bloomTimer = null;

    function wait(ms) {
        return new Promise((resolve) => {
            setTimeout(resolve, ms);
        });
    }

    function cacheMessageText() {
        messageLines.forEach((line) => {
            line.dataset.text = line.textContent;
        });
    }

    function resetMessageForTyping() {
        messageLines.forEach((line) => {
            line.textContent = '';
            line.classList.remove('is-typing');
        });
    }

    function setMessageImmediate() {
        messageLines.forEach((line) => {
            line.textContent = line.dataset.text || '';
            line.classList.remove('is-typing');
        });
    }

    async function playTypewriter() {
        if (reduceMotion) {
            setMessageImmediate();
            return;
        }

        const runId = ++typingRunId;
        resetMessageForTyping();

        for (let i = 0; i < messageLines.length; i += 1) {
            if (runId !== typingRunId) {
                return;
            }

            const line = messageLines[i];
            const text = line.dataset.text || '';
            const isTitle = line.id === 'title';
            const charDelay = isTitle ? 44 : 30;
            line.classList.add('is-typing');

            for (let j = 0; j < text.length; j += 1) {
                if (runId !== typingRunId) {
                    return;
                }

                line.textContent += text[j];
                await wait(charDelay);
            }

            line.classList.remove('is-typing');
            await wait(140);
        }
    }

    function createSparkleBurst() {
        if (reduceMotion) {
            return;
        }

        const rect = card.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const count = 16;

        for (let i = 0; i < count; i += 1) {
            const sparkle = document.createElement('span');
            sparkle.className = 'sparkle';
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.45;
            const distance = 45 + Math.random() * 80;
            sparkle.style.setProperty('--x', `${centerX}px`);
            sparkle.style.setProperty('--y', `${centerY}px`);
            sparkle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
            sparkle.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
            sparkle.style.setProperty('--s', `${6 + Math.random() * 8}px`);
            sparkle.addEventListener('animationend', () => sparkle.remove(), { once: true });
            sparkleLayer.appendChild(sparkle);
        }
    }

    function toggleCard() {
        const willOpen = !card.classList.contains('open');
        card.classList.toggle('open', willOpen);
        card.setAttribute('aria-expanded', String(willOpen));

        if (willOpen) {
            card.classList.add('fresh-open');
            if (bloomTimer) {
                clearTimeout(bloomTimer);
            }
            bloomTimer = setTimeout(() => {
                card.classList.remove('fresh-open');
            }, 720);
            createSparkleBurst();
            playTypewriter();
            return;
        }

        typingRunId += 1;
        setMessageImmediate();
    }

    function createFlowers() {
        const flowerCount = 18;
        for (let i = 0; i < flowerCount; i += 1) {
            const flower = document.createElement('span');
            flower.className = 'flower';
            flower.style.left = `${Math.random() * 100}vw`;
            flower.style.setProperty('--size', `${14 + Math.random() * 20}px`);
            flower.style.setProperty('--duration', `${8 + Math.random() * 8}s`);
            flower.style.setProperty('--delay', `${-Math.random() * 16}s`);
            flower.style.setProperty('--drift', `${-42 + Math.random() * 84}px`);
            flower.style.setProperty('--opacity', `${0.35 + Math.random() * 0.45}`);
            flowerRain.appendChild(flower);
        }
    }

    cacheMessageText();
    setMessageImmediate();
    createFlowers();

    card.addEventListener('click', toggleCard);
    card.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggleCard();
        }
    });
</script>
</body>
</html>
