<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>

    <style>

       .selectedColor {
            overflow: auto;
            border: 2px solid yellow;
            transform: scale(1.1);
        }
        canvas {
            border: 2px solid black;

            overflow: hidden;
             display: block;
             touch-action: none;
             max-width: 100%;
             height: auto;
        }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            margin-left: 100px;
            min-width: 260px;
        }

        .tab-bar {
            display: flex;
            border-bottom: 2px solid #ccc;
        }

        .tab-bar button {
            flex: 1;
            margin: 0;
            padding: 10px;
            border-bottom: 2px solid transparent;
            background: #f1f1f1;
        }

        .tab-bar button.active {
            background: #fff;
            border-bottom: 2px solid #333;
            font-weight: bold;
        }

        .tab-panel {
            display: none;
            padding: 12px;
            flex-direction: column;
            align-items: center;
        }

        .tab-panel.active {
            display: flex;
        }

        .tab-actions {
            display: flex;
            justify-content: center;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }

        .content {
            display: flex;
            flex-direction: row;
            align-items: center;
            overflow: hidden;
        }

        .colors-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);

            overflow: hidden;
        }

        #button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
        }   

        button {
            padding: 10px;
            margin: 10px;
            border: none;
            background-color: #f1f1f1;
            cursor: pointer;
        }

        button:hover {
            background-color: #ddd;
        }

        button.selected{
            background-color: #ccc;
        }

        /*
        If you are reading this you are a nerd
        
        */
    </style>
</head>
<body>
    <div class="content">

        <canvas id="drawing" onpointerdown="startdraw(event)" onpointerup="stopdraw()" onpointercancel="stopdraw()" onpointerleave="stopdraw()"
         width="500px" height="400px">
        </canvas>

        <div >

            <div> 
  
              
            </div>

            <div id="controls">
                <div class="tab-bar">
                    <button data-tab="brush" class="active" onclick="selectTab('brush')">Brush</button>
                    <button data-tab="colors" onclick="selectTab('colors')">Colors</button>
                    <button data-tab="layers" onclick="selectTab('layers')">Layers</button>
                </div>

                <div id="tab-brush" class="tab-panel active">
                    <div id="pen-size-display">Pen Size: 5</div>
                    <input type="range" min="1" max="50" value="5" onchange="updatePen()" oninput="updatePen()">
                </div>

                <div id="tab-colors" class="tab-panel">
                    <div>
                        <input type="color" onchange="updateColor()">
                        <button onclick="saveColor()">+</button>
                    </div>
                    <div class="colors-container"></div>
                </div>

                <div id="tab-layers" class="tab-panel">
                    <div id="button-grid"></div>
                </div>

                <div class="tab-actions">
                    <button onclick="clearDisplay()">Clear</button>
                    <button onclick="saveCanvas()">Save</button>
                </div>
            </div>
        </div>
    </div>



    <script>
        let canvas = document.getElementById('drawing');

        let ctx = canvas.getContext('2d');
        let drawing = false;
        ctx.fillStyle = "rgb(255, 255, 255)"
        let stack = [];
        let reverseStack = [];
        let colors = [];
        let activeColor = {r: 0, g: 0, b: 0};
        let mouseX , mouseY;

        let layers = [];
        let currentLayer = 0;


        let penSize =5;

        function saveCanvas() {
            var link = document.createElement('a');
            link.download = 'canvas_image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            }


        document.addEventListener('DOMContentLoaded', () => {
            for (let i = 1; i < 10; i++) {
                layers.push([]);
            }

            for (let i = 0; i < layers.length; i++) {
                let button = document.createElement('button');
                button.classList.add('layer-button');

                button.innerText = i+1;
                if (i == 1) {
                    button.classList.add('selected');
                }
                button.addEventListener('click', () => {
                    select_layer(i)

                });
                document.getElementById('button-grid').appendChild(button);
            }


            let add_layer_button = document.createElement('button');
            add_layer_button.innerText = '+';
            add_layer_button.addEventListener('click', () => {
                layers.push([]);
                let button = document.createElement('button');
                button.classList.add('layer-button');
                button.innerText = layers.length;
                let value = layers.length;
                button.addEventListener('click', () => {

                    select_layer(value-1);
                });
                document.getElementById('button-grid').appendChild(button);
            });
            document.getElementById('button-grid').appendChild(add_layer_button);


                let savedColors = JSON.parse(localStorage.getItem('colors'));
                if (savedColors) {
                    savedColors.forEach(color => {
                        setActiveColor(color);
                        saveColor();
                    });
                }

        });

        function select_layer(layer){
                    currentLayer = layer
                    let buttons = document.getElementsByClassName('layer-button');
                    for (let i = 0; i < buttons.length; i++) {
                        console.log(buttons[i]);
                        buttons[i].classList.remove('selected');
                    }
                    buttons[currentLayer].classList.add('selected');
        }

        function hex(x) {
            return ("0" + parseInt(x).toString(16)).slice(-2);
        }

        function setActiveColor(color) {
            activeColor = color;
            let colorInput = document.querySelector('input[type="color"]');
            colorInput.value = "#"+ hex(color.r) + hex(color.g) + hex(color.b);
        }


        function saveColor() {
            if(colors.includes(activeColor)) {
                return;
            }
            colors.push(activeColor);

            let color = activeColor;
            let colorContainer = document.querySelector('.colors-container');
            let colorDiv = document.createElement('div');
            colorDiv.style.backgroundColor = colorMap(activeColor);
            colorDiv.style.width = '20px';
            colorDiv.style.height = '20px';
            colorDiv.style.margin = '5px';
            colorDiv.style.borderRadius = '50%';
            colorDiv.style.cursor = 'pointer';
            colorDiv.addEventListener('click', () => {
                setActiveColor(color);


            for (let i = 0; i < colorContainer.children.length; i++) {
                colorContainer.children[i].classList.remove('selectedColor');
            }

                colorDiv.classList.add('selectedColor');
            });
            colorContainer.appendChild(colorDiv);
            localStorage.setItem('colors', JSON.stringify(colors));
        }
    
        function updateColor() {
            let color = document.querySelector('input[type="color"]').value;
            let r = parseInt(color.substring(1, 3), 16);
            let g = parseInt(color.substring(3, 5), 16);
            let b = parseInt(color.substring(5, 7), 16);
            activeColor = {r: r, g: g, b: b};
        }    

        function updatePen() {
            penSize = document.querySelector('input[type="range"]').value;
            document.getElementById('pen-size-display').innerText = `Pen Size: ${penSize}`;
        }

        function selectTab(name) {
            document.querySelectorAll('.tab-bar button').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === name);
            });
            document.querySelectorAll('.tab-panel').forEach(p => {
                p.classList.toggle('active', p.id === 'tab-' + name);
            });
        }

        function clearDisplay() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stack = [];
            reverseStack = [];
            layers = [];
            for (let i = 1; i < 10; i++) {
                layers.push([]);
            }
        }


        ctx.fillRect(0, 0, canvas.width, canvas.height);    

        function getCanvasPos(event) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            return {
                x: (event.clientX - rect.left) * scaleX,
                y: (event.clientY - rect.top) * scaleY
            };
        }

        function startdraw(event) {
            event.preventDefault();
            drawing = true;
            let pos = getCanvasPos(event);
            mouseX = pos.x;
            mouseY = pos.y;
            let pixel = {x: pos.x, y: pos.y, color: activeColor, penSize: penSize};
            stack.push(pixel);
            layers[currentLayer].push(pixel);
        }

        function stopdraw() {
            drawing = false;
        }

        canvas.addEventListener('pointermove', (event) => {
            event.preventDefault();
            let pos = getCanvasPos(event);
            mouseX = pos.x;
            mouseY = pos.y;
        });

        document.addEventListener('keydown', (event) => {
            if (event.key == 'c') {
                clearDisplay();
            }

            if (event.key == 'z' && event.ctrlKey) {
                if (stack.length > 0) {
                    let last = stack.pop();
                    reverseStack.push(last);
                    ctx.clearRect(last.x, last.y, last.penSize, last.penSize);
                }
            }

            if (event.key == 'y' && event.ctrlKey) {
                if (reverseStack.length > 0) {
                    let last = reverseStack.pop();
                    stack.push(last);
                    ctx.fillStyle = last.color;
                    ctx.fillRect(last.x, last.y, penSize, penSize);
                }
            }
        });

        function colorMap(color) {
            return `rgb(${color.r}, ${color.g}, ${color.b})`;
        }

        function update() {
            //ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (drawing) {
                let pixel = {x: mouseX, y: mouseY, color: activeColor, penSize: penSize};
                stack.push(pixel);
                layers[currentLayer].push(pixel);
                ctx.fillStyle = colorMap(activeColor);
                ctx.fillRect(mouseX, mouseY, penSize, penSize);
            }

            for (let i = 0; i < layers.length; i++) {
                let layer = layers[i];
                for (let j = 0; j < layer.length; j++) {
                    let pixel = layer[j];
                    ctx.fillStyle = colorMap(pixel.color);
                    ctx.fillRect(pixel.x, pixel.y, pixel.penSize, pixel.penSize);
                }
            }



            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);


    </script>
</body>
</html>
